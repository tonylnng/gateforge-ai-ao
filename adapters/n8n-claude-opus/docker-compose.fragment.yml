# =============================================================================
# Drop-in service block — copy under `services:` in infrastructure/docker-compose.yml
#
# Enables:
#   adapter-n8n-claude-opus   — AI-AO adapter (TypeScript)
#   n8n                       — self-hosted n8n (optional; use only if you
#                               don't have a separate n8n deployment)
#
# Start:
#   docker compose --profile n8n-claude-opus up -d
#   docker compose --profile n8n-claude-opus --profile n8n up -d
# =============================================================================

  # ---------------------------------------------------------------------------
  # AI-AO adapter — translates NATS envelopes ↔ n8n webhook calls
  # ---------------------------------------------------------------------------
  adapter-n8n-claude-opus:
    image: ghcr.io/tonylnng/gateforge-aiao-adapter-n8n-claude-opus:0.1.0
    container_name: aiao-adapter-n8n-claude-opus
    restart: unless-stopped
    profiles: ["n8n-claude-opus"]
    env_file: [.env]
    ports:
      - "${ADAPTER_N8N_HTTP_PORT:-8204}:8204"
    networks: [aiao]
    depends_on:
      nats:         { condition: service_healthy }
      orchestrator: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8204/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # ---------------------------------------------------------------------------
  # n8n self-hosted (optional — skip if using a separately deployed n8n)
  # ---------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: aiao-n8n
    restart: unless-stopped
    profiles: ["n8n"]
    environment:
      - N8N_HOST=${N8N_HOST:-n8n}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://n8n:5678}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_JWT_SECRET}
      # Timezone — matches AI-AO stack
      - GENERIC_TIMEZONE=${TZ:-Asia/Hong_Kong}
      - TZ=${TZ:-Asia/Hong_Kong}
      # OTel (optional but recommended — traces n8n executions alongside AI-AO)
      - N8N_METRICS=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks: [aiao]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5678/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "3" }
