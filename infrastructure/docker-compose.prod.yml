# =============================================================================
# GateForge AI-AO — Production Overrides
# =============================================================================
# Apply on top of base:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# What this overrides:
#   - restart: always (vs unless-stopped)
#   - resource limits (memory, cpus)
#   - removes host port exposure for internal services (only ingress reachable)
#   - tightens healthcheck windows
# =============================================================================

services:

  nats:
    restart: always
    deploy:
      resources:
        limits:    { cpus: "2.0", memory: 2G }
        reservations: { cpus: "0.5", memory: 512M }
    # Internal-only — reach via service name from other containers.
    ports: !reset []

  minio:
    restart: always
    deploy:
      resources:
        limits:    { cpus: "2.0", memory: 4G }
        reservations: { cpus: "0.5", memory: 1G }
    # Console kept exposed for ops; API internal-only.
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  postgres:
    restart: always
    deploy:
      resources:
        limits:    { cpus: "2.0", memory: 2G }
        reservations: { cpus: "0.5", memory: 512M }
    ports: !reset []
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_INITDB_ARGS: "--data-checksums"
      TZ: ${TZ:-UTC}

  orchestrator:
    restart: always
    deploy:
      resources:
        limits:    { cpus: "2.0", memory: 1G }
        reservations: { cpus: "0.5", memory: 256M }
    environment:
      ORCH_LOG_LEVEL: info

  grafana:
    restart: always
    environment:
      GF_SERVER_ROOT_URL: https://${PUBLIC_HOST}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"

  otel-collector:
    restart: always
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512M }

  tempo:
    restart: always

  loki:
    restart: always
