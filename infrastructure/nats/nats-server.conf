# =============================================================================
# NATS JetStream — GateForge AI-AO bus configuration
# =============================================================================
# Reference: https://docs.nats.io/running-a-nats-service/configuration
#
# This config is for the single-VM all-in-one stack.  For HA clustering, see
# infrastructure/nats/cluster.conf (added in Phase 7+).
# =============================================================================

server_name: aiao-nats-1
listen: 0.0.0.0:4222

# HTTP monitoring + healthz endpoint used by docker healthcheck.
http_port: 8222

# Maximum payload (8 MB).  Above this, publish via MinIO presigned URL and
# put the URL in the event payload (see protocol/PROTOCOL-SPEC.md §Artifacts).
max_payload: 8MB

# JetStream — the persistence layer that gives us at-least-once delivery,
# replay, and consumer groups.
jetstream {
  store_dir: /data/jetstream
  # File-store budget.  Adjust per VM disk size.
  max_file_store: 20GB
  max_memory_store: 512MB
  # Domain enables cross-cluster replication when we add HA later.
  domain: aiao
}

# Logging — JSON for easy ingestion into Loki.
logtime: true
debug: false
trace: false

# Limits — defensive defaults for production correctness.
max_connections: 4096
max_subscriptions: 100000
ping_interval: 30s
ping_max: 3
write_deadline: 10s

# -----------------------------------------------------------------------------
# AUTH (basic mode for dev — replace with NSC operator/account JWTs in prod)
# -----------------------------------------------------------------------------
# In production, comment this `accounts` block out and uncomment the
# `operator: /etc/nats/operator.jwt` + `resolver` block below it.
# See install/03-nats.md §"Decentralized Auth" for the bootstrap.
# -----------------------------------------------------------------------------

accounts {
  AIAO {
    jetstream: enabled
    users = [
      { user: "orchestrator", password: "$2a$11$replace_me_with_bcrypt_hash" },
      { user: "adapter",      password: "$2a$11$replace_me_with_bcrypt_hash" },
      { user: "observer",     password: "$2a$11$replace_me_with_bcrypt_hash",
        permissions = {
          subscribe = ["aiao.>"]
          publish   = []
        } }
    ]
  }
  SYS { users = [ { user: "sys", password: "$2a$11$replace_me_with_bcrypt_hash" } ] }
}
system_account: SYS

# -----------------------------------------------------------------------------
# JWT-based auth (production) — uncomment after running:
#   nsc add operator --generate-signing-key --sys --name aiao-op
#   nsc add account --name AIAO
#   nsc add user --account AIAO --name orchestrator
#   nsc add user --account AIAO --name adapter
# -----------------------------------------------------------------------------
# operator: /etc/nats/operator.jwt
# resolver: MEMORY
# resolver_preload: {
#   "AAAAA...": "eyJ0eXAiOi..."   # AIAO account JWT
# }
